<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4">

                </p>
</div>
<!-- OTP Input Form -->
<form onsubmit="event.preventDefault(); window.location.href='#';">
<div class="flex justify-between items-center mb-8 gap-2" dir="ltr">
<input autofocus="" class="input-otp" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input class="input-otp" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input class="input-otp" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<span class="text-outline-variant font-bold mx-1">-</span>
<input class="input-otp" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input class="input-otp" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input class="input-otp" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
</div>
<!-- Timer & Resend -->
<div class="flex justify-between items-center mb-8 font-label-md text-label-md">
<span class="text-on-surface-variant" id="timer">مانده تا دریافت مجدد کد: <span class="font-data-mono text-data-mono text-primary mr-1" dir="ltr">01:59</span></span>
<button class="text-on-surface-variant opacity-50 cursor-not-allowed hover:text-primary transition-colors" disabled="" id="resendBtn" type="button">
                        ارسال مجدد
                    </button>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-4">
<button class="w-full bg-primary text-on-primary py-3 px-4 rounded-DEFAULT font-label-md text-label-md hover:bg-primary/90 transition-colors flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-lg">check_circle</span>
                        تایید و ورود
                    </button>

</main>
<script>
        // Simple OTP input focus logic
        const inputs = document.querySelectorAll('.input-otp');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Simple Timer logic (Visual only for demonstration)
        let timeLeft = 119; // 1:59
        const timerElement = document.querySelector('#timer span');
        const resendBtn = document.getElementById('resendBtn');
        const timerText = document.getElementById('timer');

        const countdown = setInterval(() => {
            timeLeft--;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerElement.textContent = `0${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerText.innerHTML = '<span class="text-error">زمان شما به پایان رسید</span>';
                resendBtn.disabled = false;
                resendBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'text-on-surface-variant');
                resendBtn.classList.add('text-primary', 'font-bold');
            }
        }, 1000);
    </script>
