<div class="absolute inset-0 z-0">

<div class="absolute inset-0 bg-primary/80 mix-blend-multiply"></div>
<div class="absolute inset-0 bg-gradient-to-t from-background/90 to-transparent"></div>
</div>
<!-- Login Container -->
<div class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Glassmorphism Card -->
<div class="bg-surface/95 backdrop-blur-md border border-primary/10 rounded-xl shadow-2xl p-xl flex flex-col gap-lg">
<!-- Header / Brand -->
<div class="flex flex-col items-center justify-center gap-sm mb-sm text-center">
<div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center shadow-md mb-2">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="subway">subway</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">خط‌ یار</h1>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">سیستم مدیریت مترو</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-md">
<!-- Username / Personnel ID -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="personnel-id">کد پرسنلی / نام کاربری</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline" data-icon="badge">badge</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 pr-10 pl-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-body-md text-on-surface transition-colors" id="personnel-id" placeholder="کد پرسنلی خود را وارد کنید" required="" type="text"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">رمز عبور</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 pr-10 pl-10 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-body-md text-on-surface transition-colors" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute left-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between mt-sm">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">مرا به خاطر بسپار</span>
</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container hover:underline transition-colors focus:outline-none" href="#">رمز عبور را فراموش کرده‌اید؟</a>
</div>
<!-- Login Action -->
<button class="mt-sm w-full bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md py-4 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98] shadow-md focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="submit">
<span>ورود به سیستم</span>
<span class="material-symbols-outlined text-sm" data-icon="login">login</span>
</button>
</form>
<!-- Registration Link -->
<div class="mt-md text-center border-t border-outline-variant pt-lg">
<p class="font-label-md text-label-md text-on-surface-variant">
                    حساب کاربری ندارید؟ 
                    <a class="text-primary font-bold hover:text-primary-container hover:underline transition-colors" href="#">ثبت نام کنید</a>
</p>
