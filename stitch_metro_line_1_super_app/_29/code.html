<body class="bg-background text-on-background antialiased flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-inverse-surface docked full-width top-0 sticky z-50 border-b border-outline-variant dark:border-outline flat no shadows flex items-center justify-between px-margin-mobile h-touch-target-min w-full">
<div class="flex items-center gap-gutter">
<button class="text-primary dark:text-primary-fixed-dim hover:bg-surface-container-low transition-colors active:scale-95 duration-100 p-2 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary dark:text-primary-container">
                سامانه ارتباطات خط ۱
            </h1>
</div>
<div class="flex items-center">
<button class="hover:bg-surface-container-low transition-colors active:scale-95 duration-100 p-1 rounded-full overflow-hidden">
<img alt="Profile of Metro Personnel" class="w-8 h-8 rounded-full object-cover" data-alt="A small, professional avatar portrait of a metro line 1 operations personnel member. The photo is well-lit, high contrast, showing a person in a subtle, dark uniform against a neutral bright background. The aesthetic is clean, industrial corporate, and suitable for a secure mobile application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCvCdVZ3Jl-0-095I7GFP2rInpmt-w_tt51jE_F5gTP3AOD5ndLSSupVGEYWk12Oyi7CEUoJcGL-ubcUEo69LyGDZUfsb8bDRitBARKrTnbS0WO8132YHhDHwDYBZzp4xRL8BwxjgWoIApjdP0DIY-CEeFDZqq108Bu4PtIPkjrtk12pmbjmUo_DUgsjF7AYIbwOMzCtOEDxL9bbFAkUfj-Hb2HhgBGCWNmzSqv43U75c4vd5MZOW1vd9YN9-TY1EoySR4VviiDseia"/>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow p-margin-mobile pb-32 flex flex-col gap-6">
<div class="flex flex-col gap-2">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">ثبت بازخورد جدید</h2>
<p class="font-body-md text-body-md text-on-surface-variant">لطفاً فرم زیر را برای ارسال گزارش یا پیشنهاد به مدیریت تکمیل نمایید.</p>
</div>
<form class="flex flex-col gap-6">
<!-- Category Selection -->
<fieldset class="flex flex-col gap-unit">
<legend class="font-label-md text-label-md text-on-surface mb-2">دسته‌بندی بازخورد</legend>
<div class="grid grid-cols-2 gap-3">
<label class="relative flex items-center justify-center p-3 border border-outline rounded-lg bg-surface-container-lowest hover:bg-surface-container-low cursor-pointer transition-colors group has-[:checked]:border-primary has-[:checked]:bg-primary-fixed has-[:checked]:text-on-primary-fixed">
<input checked="" class="sr-only" name="category" type="radio" value="suggestion"/>
<span class="font-body-md text-body-md flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">lightbulb</span>
                            پیشنهاد
                        </span>
</label>
<label class="relative flex items-center justify-center p-3 border border-outline rounded-lg bg-surface-container-lowest hover:bg-surface-container-low cursor-pointer transition-colors group has-[:checked]:border-primary has-[:checked]:bg-primary-fixed has-[:checked]:text-on-primary-fixed">
<input class="sr-only" name="category" type="radio" value="criticism"/>
<span class="font-body-md text-body-md flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">report</span>
                            انتقاد
                        </span>
</label>
<label class="relative flex items-center justify-center p-3 border border-outline rounded-lg bg-surface-container-lowest hover:bg-surface-container-low cursor-pointer transition-colors group has-[:checked]:border-primary has-[:checked]:bg-primary-fixed has-[:checked]:text-on-primary-fixed">
<input class="sr-only" name="category" type="radio" value="complaint"/>
<span class="font-body-md text-body-md flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">warning</span>
                            شکایت
                        </span>
</label>
<label class="relative flex items-center justify-center p-3 border border-outline rounded-lg bg-surface-container-lowest hover:bg-surface-container-low cursor-pointer transition-colors group has-[:checked]:border-primary has-[:checked]:bg-primary-fixed has-[:checked]:text-on-primary-fixed">
<input class="sr-only" name="category" type="radio" value="appreciation"/>
<span class="font-body-md text-body-md flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">thumb_up</span>
                            تقدیر
                        </span>
</label>
</div>
</fieldset>
<!-- Message Area -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="feedback_message">متن پیام <span class="text-error">*</span></label>
<textarea class="w-full bg-surface-container-lowest border border-outline rounded-DEFAULT p-3 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all resize-none" id="feedback_message" name="message" placeholder="جزئیات پیام خود را اینجا بنویسید..." rows="6"></textarea>
</div>
<!-- Attachment Area -->
<div class="flex flex-col gap-unit">
<span class="font-label-md text-label-md text-on-surface">پیوست مستندات (اختیاری)</span>
<label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-outline-variant rounded-lg bg-surface-container-low hover:bg-surface-container cursor-pointer transition-colors">
<div class="flex flex-col items-center justify-center pt-5 pb-6">
<span class="material-symbols-outlined text-tertiary text-3xl mb-2">upload_file</span>
<p class="mb-2 font-body-md text-body-md text-tertiary">برای انتخاب فایل ضربه بزنید</p>
<p class="font-data-mono text-data-mono text-on-surface-variant">SVG, PNG, JPG یا PDF (حداکثر ۱۰ مگابایت)</p>
</div>
<input class="hidden" type="file"/>
</label>
</div>
<!-- Anonymous Toggle -->
<div class="flex items-center justify-between p-4 border border-outline-variant rounded-lg bg-surface-container-lowest">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">ارسال به صورت ناشناس</span>
<span class="font-body-md text-body-md text-on-surface-variant text-sm">نام شما در گزارش درج نخواهد شد.</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Action Buttons -->
<div class="flex gap-4 mt-4">
<button class="flex-1 bg-primary text-on-primary font-label-md text-label-md h-touch-target-min rounded-DEFAULT shadow-sm active:shadow-inner active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-[20px]">send</span>
                    ارسال پیام
                </button>
<button class="flex-1 border-2 border-outline text-on-surface font-label-md text-label-md h-touch-target-min rounded-DEFAULT hover:bg-surface-container-low active:bg-surface-container transition-all flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[20px]">close</span>
                    انصراف
                </button>
</div>
</form>
</main>

<nav class="md:hidden fixed bottom-0 w-full z-50 border-t border-outline-variant dark:border-outline bg-surface dark:bg-inverse-surface flat no shadows flex justify-around items-center h-16 px-margin-mobile pb-safe">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim hover:bg-surface-container-highest transition-all active:inner-shadow-sm duration-75 flex-1 h-full">
<span class="material-symbols-outlined text-[24px]">dashboard</span>
<span class="font-label-md text-label-md mt-1 text-[10px]">داشبورد</span>
</button>

<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">add_comment</span>
<span class="font-label-md text-label-md mt-1 text-[10px]">ثبت بازخورد</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim hover:bg-surface-container-highest transition-all active:inner-shadow-sm duration-75 flex-1 h-full">
<span class="material-symbols-outlined text-[24px]">track_changes</span>
<span class="font-label-md text-label-md mt-1 text-[10px]">پیگیری</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim hover:bg-surface-container-highest transition-all active:inner-shadow-sm duration-75 flex-1 h-full">
<span class="material-symbols-outlined text-[24px]">settings</span>
<span class="font-label-md text-label-md mt-1 text-[10px]">تنظیمات</span>
</button>
</nav>
</body></html>
