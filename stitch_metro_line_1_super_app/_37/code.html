<style>
        body {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            font-family: 'Vazirmatn', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Radio button custom styling */
        input[type="radio"]:checked + div {
            border-color: theme('colors.primary');
            background-color: theme('colors.primary-fixed');
            color: theme('colors.on-primary-fixed');
        }
        input[type="radio"]:checked + div .radio-indicator {
            background-color: theme('colors.primary');

    body {

<body class="flex flex-col min-h-screen">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-inverse-surface border-b border-outline-variant dark:border-outline flat no shadows flex justify-between items-center px-margin-mobile h-touch-target-min">
<button aria-label="بستن" class="flex items-center justify-center w-touch-target-min h-touch-target-min text-on-surface-variant dark:text-on-secondary-fixed-variant hover:bg-surface-container-high transition-colors active:scale-95 duration-100 rounded-full">
<span class="material-symbols-outlined text-[24px]" data-icon="close">close</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary dark:text-primary-fixed-dim">بررسی سریع درک مطلب</h1>
<div class="w-touch-target-min"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content -->
<main class="flex-1 px-margin-mobile pt-[calc(theme(spacing.touch-target-min)+theme(spacing.margin-mobile))] pb-[calc(theme(spacing.touch-target-min)+theme(spacing.margin-mobile)*2)] overflow-y-auto">
<!-- Progress Header -->
<div class="mb-gutter">
<div class="flex justify-between items-center mb-unit">
<span class="font-label-md text-label-md text-on-surface-variant">سوال ۱ از ۳</span>
<span class="font-data-mono text-data-mono text-secondary">۳۳٪</span>
</div>
<!-- Progress Bar -->
<div class="w-full h-2 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary" style="width: 33%;"></div>
</div>
</div>
<!-- Question Container -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-gutter shadow-sm mb-gutter">
<h2 class="font-headline-md text-headline-md-mobile text-on-surface mb-gutter leading-tight">در صورت مشاهده دود در تونل، اولین اقدام اپراتور خط چیست؟</h2>
<!-- Options List -->
<div class="flex flex-col gap-unit">
<!-- Option A -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="quiz-question" type="radio" value="A"/>
<div class="flex items-start gap-gutter p-gutter rounded-lg border-2 border-surface-container-highest bg-surface hover:bg-surface-container-low transition-colors duration-200">
<div class="radio-indicator flex-shrink-0 w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center mt-1 transition-colors duration-200">
<!-- Inner dot for checked state -->
<div class="w-2.5 h-2.5 rounded-full bg-on-primary hidden peer-checked:block"></div>
</div>
<div class="flex-1">
<span class="font-body-md text-body-md text-on-surface block">توقف اضطراری و باز کردن درها</span>
</div>
</div>
</label>
<!-- Option B -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="quiz-question" type="radio" value="B"/>
<div class="flex items-start gap-gutter p-gutter rounded-lg border-2 border-surface-container-highest bg-surface hover:bg-surface-container-low transition-colors duration-200">
<div class="radio-indicator flex-shrink-0 w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center mt-1 transition-colors duration-200">
<!-- Inner dot for checked state -->
<div class="w-2.5 h-2.5 rounded-full bg-on-primary hidden peer-checked:block"></div>
</div>
<div class="flex-1">
<span class="font-body-md text-body-md text-on-surface block">اطلاع سریع به مرکز فرمان (OCC)</span>
</div>
</div>
</label>
<!-- Option C -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="quiz-question" type="radio" value="C"/>
<div class="flex items-start gap-gutter p-gutter rounded-lg border-2 border-surface-container-highest bg-surface hover:bg-surface-container-low transition-colors duration-200">
<div class="radio-indicator flex-shrink-0 w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center mt-1 transition-colors duration-200">
<!-- Inner dot for checked state -->
<div class="w-2.5 h-2.5 rounded-full bg-on-primary hidden peer-checked:block"></div>
</div>
<div class="flex-1">
<span class="font-body-md text-body-md text-on-surface block">ادامه مسیر تا ایستگاه بعدی با سرعت کم</span>
</div>
</div>

</div>
</div>

<!-- Bottom Action Area -->
<div class="fixed bottom-0 w-full bg-surface-container-lowest border-t border-surface-variant p-margin-mobile z-50">
<button class="w-full h-touch-target-min bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md rounded-lg flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-sm" type="button">
<span>ثبت و مرحله بعد</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<!-- Navigation suppressed as this is a transactional task-focused screen -->
<script>
        // Simple script to handle radio selection visual updates specifically if needed beyond CSS
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Remove checked dot from all
                document.querySelectorAll('.radio-indicator div').forEach(dot => {
                    dot.classList.add('hidden');
                });
                // Add to selected
                if(e.target.checked) {
                    const indicator = e.target.nextElementSibling.querySelector('.radio-indicator div');
                    if(indicator) indicator.classList.remove('hidden');
                }
            });
        });
    </script>
