<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .sos-btn {
            background: radial-gradient(circle, var(--tw-colors-primary) 0%, #8a0003 100%);
            box-shadow: 0 0 0 0 rgba(188, 0, 4, 0.7);
        }
        
        .sos-btn:active {
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
            transform: scale(0.95);
        }

        .ring-animation {
            stroke-dasharray: 880;
            stroke-dashoffset: 880;
            transition: stroke-dashoffset 3s linear;
        }

        .holding .ring-animation {
            stroke-dashoffset: 0;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(188, 0, 4, 0.4); }
            70% { box-shadow: 0 0 0 40px rgba(188, 0, 4, 0); }
            100% { box-shadow: 0 0 0 0 rgba(188, 0, 4, 0); }
        }

        .pulsate {
            animation: pulse 2s infinite;
        }

        /* Enforce light mode for this task as requested, but user requested dark mode preferred for emergency.

<body class="bg-inverse-surface text-surface flex flex-col h-screen overflow-hidden rtl font-body-md select-none">
<!-- Top Navigation Area (Status Bar) -->

<div class="flex flex-col items-end">

</div>

</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile pb-24 pt-4 flex flex-col items-center relative">

<div>

</div>
</div>
<div class="text-left font-data-mono text-data-mono text-secondary">
                ۳۵.۸۰۴۵° N<br/>۵۱.۴۲۸۹° E
            </div>
</div>
<!-- Centerpiece SOS Button -->
<div class="relative flex items-center justify-center my-8 touch-none" id="sosContainer">
<!-- Progress Ring -->
<svg class="absolute w-72 h-72 transform -rotate-90 pointer-events-none" viewbox="0 0 300 300">
<circle class="opacity-20" cx="150" cy="150" fill="none" r="140" stroke="var(--tw-colors-surface-variant)" stroke-width="8"></circle>

<script>
        // SOS Button Interaction Logic
        const sosContainer = document.getElementById('sosContainer');
        const sosBtn = document.getElementById('sosBtn');
        let holdTimeout;

        const startHold = (e) => {
            e.preventDefault(); // Prevent scroll/zoom on mobile
            sosContainer.classList.add('holding');
            // Provide immediate haptic feedback if supported
            if (navigator.vibrate) navigator.vibrate(50);
            
            holdTimeout = setTimeout(() => {
                activateSOS();
            }, 3000);
        };

        const endHold = () => {
            sosContainer.classList.remove('holding');
            clearTimeout(holdTimeout);
        };

        const activateSOS = () => {
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 500]);
            sosBtn.innerHTML = `
                <span class="material-symbols-outlined text-[80px] mb-2" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
                <span class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold">فعال شد</span>
                <span class="font-label-md text-label-md mt-4 opacity-90 uppercase tracking-widest bg-black/20 px-4 py-1 rounded-full">در حال ردیابی</span>
            `;
            sosBtn.classList.remove('bg-gradient-to-br');
            sosBtn.classList.add('bg-error');
            sosContainer.classList.remove('holding');
        };

        // Touch events
        sosBtn.addEventListener('touchstart', startHold);
        sosBtn.addEventListener('touchend', endHold);
        sosBtn.addEventListener('touchcancel', endHold);
        
        // Mouse events for desktop testing
        sosBtn.addEventListener('mousedown', startHold);
        sosBtn.addEventListener('mouseup', endHold);
        sosBtn.addEventListener('mouseleave', endHold);
    </script>
