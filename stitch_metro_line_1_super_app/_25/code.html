<!DOCTYPE html>

<html dir="rtl" lang="fa"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ثبت سریع خرابی - سامانه فرمان خط یک</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#ffb4a9",
                    "on-surface-variant": "#5d3f3b",
                    "primary": "#bc0004",
                    "on-error-container": "#93000a",
                    "on-surface": "#191c1d",
                    "background": "#f8f9fa",
                    "surface": "#f8f9fa",
                    "surface-dim": "#d9dadb",
                    "primary-fixed": "#ffdad5",
                    "primary-container": "#e1271c",
                    "on-primary": "#ffffff",
                    "tertiary-container": "#767474",
                    "surface-container-highest": "#e1e3e4",
                    "on-background": "#191c1d",
                    "tertiary-fixed": "#e5e2e1",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#e4e2e1",
                    "on-primary-fixed-variant": "#930002",
                    "on-primary-fixed": "#410000",
                    "tertiary-fixed-dim": "#c8c6c5",
                    "surface-variant": "#e1e3e4",
                    "surface-container-high": "#e7e8e9",
                    "on-tertiary-fixed-variant": "#474646",
                    "tertiary": "#5d5c5b",
                    "outline": "#926f6a",
                    "on-secondary-fixed": "#1b1c1c",
                    "surface-container": "#edeeef",
                    "on-primary-container": "#fffbff",
                    "secondary": "#5f5e5e",
                    "on-tertiary-fixed": "#1c1b1b",
                    "primary-fixed-dim": "#ffb4a9",
                    "on-secondary-fixed-variant": "#474747",
                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-secondary-container": "#656464",
                    "inverse-on-surface": "#f0f1f2",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#e4e2e1",
                    "on-tertiary-container": "#f7feff",
                    "surface-bright": "#f8f9fa",
                    "outline-variant": "#e7bdb7",
                    "inverse-surface": "#2e3132",
                    "error": "#ba1a1a",
                    "surface-tint": "#c00205",
                    "on-error": "#ffffff",
                    "surface-container-low": "#f3f4f5",
                    "secondary-fixed-dim": "#c8c6c6"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "touch-target-min": "48px",
                    "gutter": "16px",
                    "margin-mobile": "16px",
                    "unit": "4px",
                    "margin-desktop": "32px"
            },
            "fontFamily": {
                    "label-md": ["Vazirmatn", "sans-serif"],
                    "headline-lg-mobile": ["Vazirmatn", "sans-serif"],
                    "body-lg": ["Vazirmatn", "sans-serif"],
                    "headline-lg": ["Vazirmatn", "sans-serif"],
                    "data-mono": ["JetBrains Mono", "monospace"],
                    "body-md": ["Vazirmatn", "sans-serif"],
                    "headline-md": ["Vazirmatn", "sans-serif"]
            },
            "fontSize": {
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "36px", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "48px", "fontWeight": "700"}],
                    "data-mono": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "36px", "fontWeight": "600"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom scrollbar for industrial feel */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: theme('colors.surface-container-lowest');
        }
        ::-webkit-scrollbar-thumb {
            background: theme('colors.outline');
            border-radius: theme('borderRadius.DEFAULT');
        }
        ::-webkit-scrollbar-thumb:hover {
            background: theme('colors.tertiary');
        }

        /* Pulse animation for live data */
        @keyframes pulse-live {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-live {
            animation: pulse-live 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        /* Inner shadow for button press */
        .active\:inner-shadow:active {
            box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim w-full top-0 sticky border-b border-outline-variant dark:border-secondary flex flex-row-reverse justify-between items-center px-margin-mobile w-full h-touch-target-min z-40">
<div class="flex items-center space-x-reverse space-x-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim text-[24px] cursor-pointer active:scale-95 duration-150" data-icon="menu">menu</span>
</div>
<div class="flex-1 flex justify-center">
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary dark:text-primary-fixed-dim tracking-tight">سامانه فرمان خط یک</h1>
</div>
<div class="flex items-center space-x-reverse space-x-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim text-[24px] cursor-pointer active:scale-95 duration-150" data-icon="notifications">notifications</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-3xl mx-auto p-margin-mobile pb-[80px] md:pb-margin-mobile flex flex-col gap-6">
<!-- Header Section -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">ثبت سریع خرابی</h2>
<div class="bg-surface-container-high px-3 py-1 rounded-DEFAULT border border-outline-variant flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse-live"></span>
<span class="font-data-mono text-data-mono text-on-surface-variant" dir="ltr" id="current-time">14:32:05</span>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">گزارش فوری نقص فنی به مرکز فرمان.</p>
</div>
<!-- Form Form -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault(); alert('گزارش با موفقیت ارسال شد.');">
<!-- Media Capture (Large Button) -->
<div class="w-full">
<button class="w-full h-32 bg-surface-container-lowest border-2 border-dashed border-outline hover:border-primary focus:border-primary focus:ring-2 focus:ring-primary-container rounded-lg flex flex-col items-center justify-center gap-2 transition-all active:inner-shadow group relative overflow-hidden" type="button">
<span class="material-symbols-outlined text-[48px] text-primary group-hover:scale-110 transition-transform" data-icon="photo_camera">photo_camera</span>
<span class="font-label-md text-label-md text-on-surface">ثبت تصویر / ویدیو از خرابی</span>
</button>
</div>
<!-- Priority Selection (Bento Style) -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface">سطح اولویت</label>
<div class="grid grid-cols-3 gap-2">
<!-- Critical -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="priority" required="" type="radio" value="critical"/>
<div class="h-16 flex items-center justify-center border border-outline rounded-DEFAULT bg-surface peer-checked:bg-error-container peer-checked:border-error peer-checked:text-on-error-container transition-colors active:inner-shadow">
<span class="font-label-md text-label-md">بحرانی</span>
</div>
</label>
<!-- Major -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="priority" type="radio" value="major"/>
<div class="h-16 flex items-center justify-center border border-outline rounded-DEFAULT bg-surface peer-checked:bg-[#fff3cd] peer-checked:border-[#ffecb5] peer-checked:text-[#664d03] transition-colors active:inner-shadow">
<span class="font-label-md text-label-md">عمده</span>
</div>
</label>
<!-- Minor -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="priority" type="radio" value="minor"/>
<div class="h-16 flex items-center justify-center border border-outline rounded-DEFAULT bg-surface peer-checked:bg-surface-container-high peer-checked:border-outline peer-checked:text-on-surface transition-colors active:inner-shadow">
<span class="font-label-md text-label-md">جزئی</span>
</div>
</label>
</div>
</div>
<!-- System Category -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="system-category">دسته‌بندی سیستم</label>
<div class="relative">
<select class="w-full bg-surface-container-lowest border border-outline rounded-DEFAULT px-4 py-3 font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary pr-4 pl-10" id="system-category" required="">
<option disabled="" selected="" value="">انتخاب کنید...</option>
<option value="signaling">سیگنالینگ (Signaling)</option>
<option value="power">تامین نیرو (Power)</option>
<option value="track">خطوط و ریل (Track)</option>
<option value="rolling_stock">ناوگان (Rolling Stock)</option>
</select>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
</div>
<!-- Location Selector & Auto-fill -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="location">موقعیت / ایستگاه</label>
<div class="flex gap-2">
<div class="relative flex-1">
<select class="w-full bg-surface-container-lowest border border-outline rounded-DEFAULT px-4 py-3 font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary pr-4 pl-10" id="location" required="">
<option disabled="" selected="" value="">انتخاب ایستگاه یا ناحیه...</option>
<option value="tajrish">ایستگاه تجریش (L1-S01)</option>
<option value="qeytariyeh">ایستگاه قیطریه (L1-S02)</option>
<option value="shahid_sadr">ایستگاه شهید صدر (L1-S03)</option>
<option value="tunnel_n">تونل شمالی (بخش ۳)</option>
</select>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
<button class="h-12 w-12 flex-shrink-0 bg-surface-container-high border border-outline rounded-DEFAULT flex items-center justify-center hover:bg-surface-container-highest transition-colors active:inner-shadow text-primary" onclick="autoFillLocation()" title="موقعیت فعلی" type="button">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
</div>
<p class="font-data-mono text-xs text-on-surface-variant mt-1 hidden" dir="ltr" id="gps-status">GPS: 35.8044° N, 51.4286° E (±5m)</p>
</div>
<!-- Description -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="description">شرح خرابی</label>
<textarea class="w-full bg-surface-container-lowest border border-outline rounded-DEFAULT px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary resize-none" id="description" placeholder="جزئیات مشاهده شده را وارد کنید..." required="" rows="4"></textarea>
</div>
<!-- Submit Button (Massive Red) -->
<div class="pt-4 mt-auto">
<button class="w-full h-14 bg-primary text-on-primary font-headline-md text-headline-md-mobile flex items-center justify-center gap-2 rounded-DEFAULT active:inner-shadow transition-transform hover:bg-primary-container" type="submit">
<span class="material-symbols-outlined text-[24px]" data-icon="send">send</span>
<span>ارسال گزارش به مرکز فرمان</span>
</button>
</div>
</form>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 border-t border-outline-variant dark:border-secondary flat no shadows flex flex-row-reverse justify-around items-center w-full h-16 bg-surface dark:bg-surface-dim">
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container-low transition-all active:inner-shadow duration-100 flex-1 h-full">
<span class="material-symbols-outlined text-[24px]" data-icon="dashboard">dashboard</span>
<span class="font-label-md text-label-md mt-1">داشبورد</span>
</button>
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim font-bold hover:bg-surface-container-low transition-all active:inner-shadow duration-100 flex-1 h-full relative">
<!-- Active indicator is the color/font-weight, plus we can add a subtle indicator if needed -->
<span class="material-symbols-outlined text-[24px] filled" data-icon="warning">warning</span>
<span class="font-label-md text-label-md mt-1 text-primary font-bold">ثبت خرابی</span>
<div class="absolute bottom-0 w-8 h-1 bg-primary rounded-t-full"></div>
</button>
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container-low transition-all active:inner-shadow duration-100 flex-1 h-full">
<span class="material-symbols-outlined text-[24px]" data-icon="calendar_month">calendar_month</span>
<span class="font-label-md text-label-md mt-1">برنامه کاری</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container-low transition-all active:inner-shadow duration-100 flex-1 h-full">
<span class="material-symbols-outlined text-[24px]" data-icon="chat">chat</span>
<span class="font-label-md text-label-md mt-1">گفتگو</span>
</button>
</nav>
<script>
        // Clock functionality for top right
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('current-time').textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Simulate GPS Auto-fill
        function autoFillLocation() {
            const select = document.getElementById('location');
            const gpsStatus = document.getElementById('gps-status');
            
            // Highlight button temporarily
            const btn = event.currentTarget;
            btn.classList.add('bg-primary-container', 'text-on-primary-container');
            
            setTimeout(() => {
                select.value = 'tajrish';
                gpsStatus.classList.remove('hidden');
                btn.classList.remove('bg-primary-container', 'text-on-primary-container');
            }, 500);
        }
    </script>
</body></html>
