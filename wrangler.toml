name = "metro-line1-app"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "metro-uploads"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[durable_objects.bindings]]
name = "CHAT_DO"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

[vars]
TURSO_DATABASE_URL = ""
R2_PUBLIC_URL = ""
NODE_ENV = "production"
